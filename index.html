<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐廳推薦</title>
<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.6/dist/amazon-cognito-identity.min.js"></script>
<style>

.active {
    background:#007bff;
    color:white;
}

body { font-family: Arial; background:#f5f5f5; margin:0; }
.header {
    background:#007bff;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}
.container { padding:15px; }
input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    cursor:pointer;
}
.primary { background:#007bff; color:white; }
.secondary { background:#6c757d; color:white; }
.quick-btn {
    width:auto;
    margin:5px;
    background:#eee;
}
.card {
    background:white;
    margin:10px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<div class="header">🍽️ 餐廳推薦系統</div>
<!-- 🔐 登入 -->
<div id="authSection" class="container">
<h2>🔐 登入 / 註冊</h2>
<input id="username" placeholder="帳號（必須是 Gmail）">
<input id="password" type="password" placeholder="密碼">
<button class="primary" onclick="register()">📝 註冊</button>
<button class="secondary" onclick="login()">🔑 登入</button>
<input id="code" placeholder="📩 驗證碼">
<button onclick="confirmUser()">✅ 驗證帳號</button>
</div>
<!-- 主畫面 -->
<div id="appSection" style="display:none;">
<div style="background:#eee;padding:10px;text-align:right;">
👤 <span id="userName"></span>
<button onclick="logout()">🚪 登出</button>
</div>
<div class="container">
🔍 搜尋餐廳（輸入名稱）
<input id="keyword" placeholder="例如：拉麵">
<button onclick="searchByName()">🔍 搜尋</button>
<hr>
📍 地點
<input id="location" value="台北">
🍜 類型
<input id="food" value="日式">
<div>
<button class="quick-btn" onclick="setFood('日式')">日式</button>
<button class="quick-btn" onclick="setFood('韓式')">韓式</button>
<button class="quick-btn" onclick="setFood('台式')">台式</button>
</div>
💰 預算
<div id="budgetBtns">
    <button class="quick-btn" onclick="setBudget(this,'$')">$（便宜）</button>
    <button class="quick-btn" onclick="setBudget(this,'$$')">$$（中等）</button>
    <button class="quick-btn" onclick="setBudget(this,'$$$')">$$$（偏貴）</button>
    <button class="quick-btn" onclick="setBudget(this,'$$$$')">$$$$（高級）</button>
</div>
<button class="primary" onclick="search()">🍜 推薦餐廳</button>
<button onclick="spinWheel()">🎲 隨機選擇</button>
<button onclick="showFav()">⭐ 我的收藏</button>
</div>
</div>
<div id="result"></div>
<script>

// 切換到編輯模式
function editFav(index) {
    document.getElementById(`display-${index}`).style.display = "none";
    document.getElementById(`edit-form-${index}`).style.display = "block";
}

// 取消編輯
function cancelEdit(index) {
    document.getElementById(`display-${index}`).style.display = "block";
    document.getElementById(`edit-form-${index}`).style.display = "none";
}

// 儲存編輯後的數據到後端
function saveEdit(index, name) {
    let id = localStorage.getItem("user_id");
    let newLoc = document.getElementById(`edit-loc-${index}`).value.trim();
    let newType = document.getElementById(`edit-type-${index}`).value.trim();

    fetch(`${API_BASE}/updateFav`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            user_id: id,
            name: name,
            location: newLoc,
            type: newType
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.msg === "updated") {
            alert("修改成功！");
            showFav(); // 重新整理列表
        } else {
            alert("修改失敗：" + (data.error || "未知錯誤"));
        }
    })
    .catch(err => {
        console.error(err);
        alert("網路錯誤");
    });
}

function openModal(url) {
    const modal = document.getElementById("photoModal");
    const modalImg = document.getElementById("modalImg");
    
    modal.style.display = "flex"; // 顯示彈窗
    modalImg.src = url;           // 將圖片網址帶入放大圖中
}

function getPhoto(photoRef){
    return `https://maps.googleapis.com/maps/api/place/photo?maxwidth=400&photoreference=${photoRef}&key=AIzaSyDdJKaLMG23gScQcpUzc0npT6pGY-FHT-E`;
}
const API_BASE = "https://39i46pikt1.execute-api.us-east-1.amazonaws.com";

let selectedBudget = "";

function setBudget(btn, b) {
    // 檢查點擊的是不是已經選中的那個按鈕
    if (selectedBudget === b) {
        // 如果是，就取消選擇
        selectedBudget = "";
        btn.classList.remove("active");
    } else {
        // 如果不是，就切換到新的預算
        selectedBudget = b;

        // 先清除所有按鈕的 active 狀態
        let buttons = document.querySelectorAll("#budgetBtns button");
        buttons.forEach(btnEl => btnEl.classList.remove("active"));

        // 幫目前的按鈕加上 active
        btn.classList.add("active");
    }
    
    console.log("目前選擇的預算層級:", selectedBudget ? budgetToLevel(selectedBudget) : "無");
}

function budgetToLevel(b){
    return b.length;
}

const poolData = {
    UserPoolId: "us-east-1_FEseKdrJX",
    ClientId: "362d0n7u8becrcmqfn0ivvmoau"
};
const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);
// UI切換
function checkUI(){
    let user = localStorage.getItem("user_id");
    let username = localStorage.getItem("username");
    if(user){
        authSection.style.display="none";
        appSection.style.display="block";
        userName.innerText=username;
    }else{
        authSection.style.display="block";
        appSection.style.display="none";
    }
}
// 🔥 Gmail限制
function isGmail(email){
    return email.endsWith("@gmail.com");
}
// 註冊
function register(){
    let u = username.value.trim();
    let p = password.value;
    if(!isGmail(u)){
        alert("❌ 只能使用 Gmail 註冊！");
        return;
    }
    let attr = [
        new AmazonCognitoIdentity.CognitoUserAttribute({
            Name:"email",
            Value:u
        })
    ];
    userPool.signUp(u, p, attr, null, function(err){
        if(err) return alert(err.message);
        alert("✅ 註冊成功！請去 Gmail 收驗證碼");
    });
}
// 驗證
function confirmUser(){
    let user = new AmazonCognitoIdentity.CognitoUser({
        Username: username.value,
        Pool: userPool
    });
    user.confirmRegistration(code.value, true, function(err){
        if(err) return alert(err.message);
        alert("✅ 驗證成功！可以登入了");
    });
}
// 登入
function login(){
    let u = username.value;
    let p = password.value;
    let auth = new AmazonCognitoIdentity.AuthenticationDetails({
        Username:u,
        Password:p
    });
    let user = new AmazonCognitoIdentity.CognitoUser({
        Username:u,
        Pool:userPool
    });
    user.authenticateUser(auth,{
        onSuccess:(res)=>{
            let id = res.getIdToken().payload.sub;
            localStorage.setItem("user_id", id);
            localStorage.setItem("username", u);
            alert("登入成功🔥");
            checkUI();
        },
        onFailure:(err)=>alert(err.message)
    });
}
// 登出
function logout(){
    localStorage.clear();
    checkUI();
}
// 類型
function setFood(type){
    food.value = type;
}
// 推薦
function search() {
    result.innerHTML = "🔄 查詢中...";
    let loc = document.getElementById("location").value.trim();
    let foodType = document.getElementById("food").value.trim();
    let bud = selectedBudget;
    let url = `${API_BASE}/recommend?`;

    if (loc) url += `location=${loc}&`;
    if (foodType) url += `food_type=${foodType}&`;
    if (bud) url += `budget=${budgetToLevel(bud)}&`;

    fetch(url)
        .then(r => r.json())
        .then(async data => {
            console.log(data);

            let list = data.recommendations;

            // ⭐ 加入判斷：如果清單是空的或不存在
            if (!list || list.length === 0) {
                result.innerHTML = `
                    <div class="card" style="text-align:center; padding: 40px;">
                        <h2 style="color: #666;">😢 找不到符合條件的餐廳</h2>
                        <p>您可以嘗試更換地點、類型或調整預算範圍再試試看！</p>
                    </div>`;
                return; // 結束函數，不執行後面的迴圈
            }

            let html = "";
            for (let r of list) {
                html += await createCardWithImage(
                    r.name,
                    r.rating,
                    r.reason,
                    r.price,
                    "搜尋",
                    loc // 這裡改用 loc 變數比較準確
                );
            }

            result.innerHTML = html;
        })
        .catch(err => {
            console.error(err);
            result.innerHTML = "❌ 發生錯誤";
        });
}
// 搜尋
function searchByName(){
    if(!keyword.value) return alert("請輸入餐廳名稱");
    fetch(`${API_BASE}/recommend?location=${keyword.value}`)
    .then(r=>r.json())
    .then(async data=>{
    let html = "";

    for (let r of data.recommendations){
    html += await createCardWithImage(
    r.name,
    r.rating,
    r.reason,
    r.price,
    "搜尋",
    keyword.value
);
}

    result.innerHTML = html;
})
}
// 卡片
async function createCardWithImage(name,rating,reason,price,type,location){
    let res = await fetch(
`https://y7rb7q6u23.execute-api.us-east-1.amazonaws.com/default/getRestaurantPhoto?name=${name}`
);
    let data = await res.json();
    console.log(data);
    let photosHTML = "";

    if(data.candidates[0] && data.candidates[0].photos){
        let photos = data.candidates[0].photos;

        photosHTML += `
        <div style="
            display:flex;
            overflow-x:auto;
            gap:10px;
            padding:5px;
        ">
            ${photos.slice(0,5).map(p=>{
                let url = getPhoto(p.photo_reference);
                return `
                <img src="${url}" 
                onclick="openModal('${url}')"
                style="
                        height:150px;
                        border-radius:10px;
                        flex-shrink:0;
                    cursor: pointer;
                ">
                `;
            }).join("")}
        </div>
        `;
    }

    return `
<div class="card">
    <h3>🍽️ ${name}</h3>

    ${photosHTML}

    ⭐ ${rating}　💰 ${price || "?"}<br>
    💡 ${reason}<br><br>

    <button onclick="toggleFav('${name}','${type}','${location}')">
        ⭐ 收藏
    </button>
</div>`;
}
// 收藏列表
function showFav(){
    let id = localStorage.getItem("user_id");
    fetch(`${API_BASE}/getFav?user_id=${id}`)
    .then(r=>r.json())
    .then(data=>{
        let html="<h2>⭐ 我的收藏</h2>";

        if(!data.favorites || data.favorites.length===0){
            result.innerHTML="📭 沒有收藏";
            return;
        }

        data.favorites.forEach((i, index)=>{
            html+=`
            <div class="card" id="fav-card-${index}">
                <h3>🍽️ ${i.name}</h3>
                <div id="display-${index}">
                    📍 <span id="loc-text-${index}">${i.location}</span><br>
                    🍜 <span id="type-text-${index}">${i.type}</span><br><br>
                    <button onclick="editFav(${index})">✏️ 編輯數據</button>
                </div>
                <div id="edit-form-${index}" style="display:none;">
                    📍 地點：<input id="edit-loc-${index}" value="${i.location}"><br>
                    🍜 類型：<input id="edit-type-${index}" value="${i.type}"><br>
                    <button class="primary" onclick="saveEdit(${index}, '${i.name}')">💾 儲存</button>
                    <button onclick="cancelEdit(${index})">取消</button>
                </div>
                <br>
                <button style="background:#ff4d4d; color:white;" onclick="removeFav('${i.name}')">❌ 取消收藏</button>
            </div>`;
        });

        result.innerHTML=html;
    });
}
// 轉盤
function spinWheel(){
    let id = localStorage.getItem("user_id");

    fetch(`${API_BASE}/getFav?user_id=${id}`)
    .then(r=>r.json())
    .then(data=>{
        let list = data.favorites;

        // ❌ 沒收藏
        if(!list || list.length === 0){
            result.innerHTML = `
            <div class="card">
                <h2>😢 還沒有收藏餐廳</h2>
                <p>先去收藏幾間再來抽吧！</p>
            </div>`;
            return;
        }

        // 🔥 取得篩選條件
        let location = document.getElementById("location").value.trim();
        let food = document.getElementById("food").value.trim();

    let filtered = list.filter(item => {
    let itemLoc = item.location.replace("臺","台");
    let inputLoc = location.replace("臺","台");

    let matchLocation = !location || itemLoc.includes(inputLoc);

    let cleanFood = (food || "").replace(/\s/g,'').toLowerCase();
    let cleanType = (item.type || "").replace(/\s/g,'').toLowerCase();

    let matchType = 
    !cleanFood ||
    cleanType.includes(cleanFood) ||
    cleanFood.includes(cleanType);

    return matchLocation && matchType; // ⭐ 必須有
});

        // ❌ 沒符合條件
        if(filtered.length === 0){
            result.innerHTML = `
            <div class="card">
                <h2>❌ 沒有符合條件的收藏</h2>
            </div>`;
            return;
        }

        // 🎡 動畫開始
        let i = 0;
        let pick;
        let interval = setInterval(()=>{
            pick = filtered[Math.floor(Math.random()*filtered.length)];

            result.innerHTML = `
            <div class="card">
                <h2>🎡 選擇中...</h2>
                <h3>${pick.name}</h3>
            </div>`;

            i++;
            if(i > 12){
                clearInterval(interval);

                result.innerHTML = `
                <div class="card">
                    <h2>🎯 今天吃這個！</h2>
                    <h1>🍜 ${pick.name}</h1>
                    📍 ${pick.location}<br>
                    🍽️ ${pick.type}
                </div>`;
            }
        },150);
    })
    .catch(err=>{
        console.error(err);
        result.innerHTML="❌ 發生錯誤";
    });
}
function removeFav(name){
    let id = localStorage.getItem("user_id");

    fetch(`${API_BASE}/deleteFav`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ user_id:id, name })
    })
    .then(()=>{
        alert("已取消收藏");
        showFav(); // 🔥 刷新列表
    })
    .catch(err=>{
        console.error(err);
        alert("刪除失敗");
    });
}

checkUI();
</script>
<div id="photoModal" onclick="this.style.display='none'" style="
    display: none; 
    position: fixed; 
    z-index: 9999; 
    left: 0; top: 0; 
    width: 100%; height: 100%; 
    background-color: rgba(0,0,0,0.9); 
    cursor: zoom-out;
    align-items: center;
    justify-content: center;
">
    <img id="modalImg" style="max-width: 90%; max-height: 90%; border-radius: 5px; box-shadow: 0 0 20px rgba(255,255,255,0.2);">

</div>
</body>
</html>
