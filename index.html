<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐廳推薦</title>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.6/dist/amazon-cognito-identity.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.header { background:#007bff; color:white; padding:15px; text-align:center; }
.container { padding:15px; }
input { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ccc; }
button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:none; }
.quick-btn { width:auto; margin:5px; background:#eee; }
.search-btn { background:#007bff; color:white; }
.card { background:white; margin:10px; padding:15px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
</style>
</head>

<body>

<div class="header">🍽️ 餐廳推薦</div>

<!-- 🔐 登入畫面 -->
<div id="authSection" class="container">
    <h2>🔐 登入 / 註冊</h2>
    <input id="username" placeholder="帳號">
    <input id="password" type="password" placeholder="密碼">
    <button onclick="register()">註冊</button>
    <button onclick="login()">登入</button>
</div>

<!-- ✅ 主畫面 -->
<div id="appSection" style="display:none;">

    <!-- 👤 使用者 -->
    <div style="background:#eee;padding:10px;text-align:right;">
        👤 <span id="userName"></span>
        <button onclick="logout()">登出</button>
    </div>

    <div class="container">

        🔍 搜尋餐廳
        <input id="keyword" placeholder="輸入餐廳名稱">
        <button onclick="searchByName()">搜尋</button>

        <hr>

        📍 地點
        <input id="location" value="台北">

        🍜 類型
        <input id="food" value="日式">
        <div>
            <button class="quick-btn" onclick="setFood('日式')">日式</button>
            <button class="quick-btn" onclick="setFood('韓式')">韓式</button>
            <button class="quick-btn" onclick="setFood('台式')">台式</button>
        </div>

        💰 預算
        <input id="budget" value="300">

        <button class="search-btn" onclick="search()">推薦餐廳</button>
        <button onclick="spinWheel()">🎲 不知道吃什麼</button>
        <button onclick="showFav()">📂 我的收藏</button>

    </div>

</div>

<div id="result"></div>

<script>
const API_BASE = "https://39i46pikt1.execute-api.us-east-1.amazonaws.com";

// 🔐 Cognito（記得填你的）
const poolData = {
    UserPoolId: "你的UserPoolId",
    ClientId: "你的ClientId"
};

const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

// 🎯 UI切換（核心🔥）
function checkUI(){

    let user = localStorage.getItem("user_id");
    let username = localStorage.getItem("username");

    if(user){
        document.getElementById("authSection").style.display = "none";
        document.getElementById("appSection").style.display = "block";
        document.getElementById("userName").innerText = username;
    }else{
        document.getElementById("authSection").style.display = "block";
        document.getElementById("appSection").style.display = "none";
    }
}

// 🔐 註冊
function register(){
    let u = username.value;
    let p = password.value;

    userPool.signUp(u, p, [], null, function(err){
        if(err){ alert(err.message); return; }
        alert("註冊成功！");
    });
}

// 🔐 登入
function login(){

    let u = username.value;
    let p = password.value;

    let auth = new AmazonCognitoIdentity.AuthenticationDetails({
        Username: u,
        Password: p
    });

    let user = new AmazonCognitoIdentity.CognitoUser({
        Username: u,
        Pool: userPool
    });

    user.authenticateUser(auth, {
        onSuccess: function (result) {

            let user_id = result.getIdToken().payload.sub;

            localStorage.setItem("user_id", user_id);
            localStorage.setItem("username", u);

            alert("登入成功🔥");

            checkUI(); // 🔥 切畫面
        },
        onFailure: function(err){
            alert(err.message);
        }
    });
}

// 🚪 登出
function logout(){
    localStorage.clear();
    checkUI();
}

// 👤 取得使用者
function getUser(){
    let id = localStorage.getItem("user_id");
    if(!id){
        alert("請先登入！");
        return null;
    }
    return id;
}

// 類型
function setFood(type){
    food.value = type;
}

// 推薦
function search(){
    let resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "🔄 查詢中...";

    fetch(`${API_BASE}/recommend?location=${location.value}&food_type=${food.value}&budget=${budget.value}`)
    .then(res=>res.json())
    .then(data=>{
        let html="";
        data.recommendations.forEach(r=>{
            html+=createCard(r.name,r.rating,r.reason,r.price,food.value,location.value);
        });
        resultDiv.innerHTML=html;
    });
}

// 搜尋
function searchByName(){
    if(!keyword.value){ alert("請輸入餐廳名稱"); return;}

    fetch(`${API_BASE}/recommend?location=${keyword.value}`)
    .then(res=>res.json())
    .then(data=>{
        let html="";
        data.recommendations.forEach(r=>{
            html+=createCard(r.name,r.rating,r.reason,r.price,"搜尋",keyword.value);
        });
        result.innerHTML=html;
    });
}

// 卡片
function createCard(name,rating,reason,price,type,location){
    return `
    <div class="card">
    <h3>${name}</h3>
    ⭐ ${rating}　💰 ${price||"?"}<br>
    💡 ${reason}<br><br>
    <button onclick="toggleFav('${name}','${type}','${location}')">
    ⭐ 收藏
    </button>
    </div>`;
}

// 收藏
function toggleFav(name,type,location){
    let user_id = getUser();
    if(!user_id) return;

    fetch(`${API_BASE}/saveFav`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ user_id, name, type, location })
    })
    .then(()=>alert("已收藏🔥"));
}

// 收藏列表
function showFav(){
    let user_id = getUser();
    if(!user_id) return;

    fetch(`${API_BASE}/getFav?user_id=${user_id}`)
    .then(res=>res.json())
    .then(data=>{
        let html="<h2>⭐ 我的收藏</h2>";
        data.favorites.forEach(item=>{
            html+=`
            <div class="card">
            <h3>${item.name}</h3>
            📍 ${item.location}<br>
            🍜 ${item.type}<br><br>
            <button onclick="removeFav('${item.name}')">❌ 取消收藏</button>
            </div>`;
        });
        result.innerHTML=html;
    });
}

// 刪除
function removeFav(name){
    let user_id = getUser();
    if(!user_id) return;

    fetch(`${API_BASE}/deleteFav`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ user_id, name })
    })
    .then(()=>showFav());
}

// 🎡 轉盤
function spinWheel(){
    let user_id = getUser();
    if(!user_id) return;

    fetch(`${API_BASE}/getFav?user_id=${user_id}`)
    .then(res=>res.json())
    .then(data=>{

        let list=data.favorites;

        let filtered=list.filter(item=>{
            let m1=!location.value||item.location.includes(location.value);
            let m2=!food.value||item.type.includes(food.value);
            return m1&&m2;
        });

        if(filtered.length===0){
            alert("沒有符合條件");
            return;
        }

        let i=0,pick;

        let interval=setInterval(()=>{
            pick=filtered[Math.floor(Math.random()*filtered.length)];

            result.innerHTML=`
            <div class="card">
            <h2>🎡 選擇中...</h2>
            <h3>${pick.name}</h3>
            </div>`;

            if(++i>12){
                clearInterval(interval);
                result.innerHTML=`
                <div class="card">
                <h2>🎯 今天吃這個！</h2>
                <h1>${pick.name}</h1>
                📍 ${pick.location}<br>
                🍜 ${pick.type}
                </div>`;
            }

        },150);
    });
}

// 🔥 初始化
checkUI();
</script>

</body>
</html>
