<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐廳推薦</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.header {
    background: #007bff;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    padding: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

.quick-btn {
    width: auto;
    margin: 5px;
    background: #eee;
}

.search-btn {
    background: #007bff;
    color: white;
}

.card {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="header">🍽️ 餐廳推薦</div>

<div class="container">

🔍 搜尋餐廳
<input id="keyword" placeholder="輸入餐廳名稱">
<button onclick="searchByName()">搜尋</button>

<hr>

📍 地點
<input id="location" value="台北">

🍜 類型
<input id="food" value="日式">

<div>
<button class="quick-btn" onclick="setFood('日式')">日式</button>
<button class="quick-btn" onclick="setFood('韓式')">韓式</button>
<button class="quick-btn" onclick="setFood('台式')">台式</button>
</div>

💰 預算
<input id="budget" value="300">

<button class="search-btn" onclick="search()">推薦餐廳</button>

<button onclick="randomPick()">🎲 不知道吃什麼</button>

</div>

<div id="result"></div>

<script>

// 類型快捷
function setFood(type) {
    document.getElementById("food").value = type;
}

// 🔥 原本推薦功能
function search() {

    let resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "🔄 查詢中...";

    let location = document.getElementById("location").value;
    let food = document.getElementById("food").value;
    let budget = document.getElementById("budget").value;

    let url = `https://39i46pikt1.execute-api.us-east-1.amazonaws.com/recommend?location=${location}&food_type=${food}&budget=${budget}&t=${Date.now()}`;

    fetch(url)
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.recommendations.forEach(r => {
            html += createCard(r.name, r.rating, r.reason, r.price, food, location);
        });

        resultDiv.innerHTML = html;
    });
}

// 🔍 搜尋餐廳名稱
function searchByName() {

    let keyword = document.getElementById("keyword").value;

    if (!keyword) {
        alert("請輸入餐廳名稱");
        return;
    }

    let url = `https://39i46pikt1.execute-api.us-east-1.amazonaws.com/recommend?location=${keyword}`;

    fetch(url)
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.recommendations.forEach(r => {
            html += createCard(r.name, r.rating, r.reason, r.price, "搜尋", keyword);
        });

        document.getElementById("result").innerHTML = html;
    });
}

// ⭐ 卡片生成（共用）
function createCard(name, rating, reason, price, type, location) {
    return `
        <div class="card">
            <h3>${name}</h3>
            ⭐ ${rating}　💰 ${price || "?"}<br>
            💡 ${reason}<br><br>

            <button onclick="toggleFav('${name}','${type}','${location}')">
                ⭐ 收藏 / 取消
            </button>
        </div>
    `;
}

// ⭐ 收藏切換
function toggleFav(name, type, location) {

    let list = JSON.parse(localStorage.getItem("fav") || "[]");

    let index = list.findIndex(item => item.name === name);

    if (index !== -1) {
        list.splice(index, 1);
        alert("已取消收藏");
    } else {
        list.push({ name, type, location });
        alert("已收藏！");
    }

    localStorage.setItem("fav", JSON.stringify(list));
}

// 🎲 隨機選
function randomPick() {

    let list = JSON.parse(localStorage.getItem("fav") || "[]");

    if (list.length === 0) {
        alert("還沒收藏餐廳！");
        return;
    }

    let location = document.getElementById("location").value;
    let food = document.getElementById("food").value;

    let filtered = list.filter(item => {
        return (
            (location === "" || item.location.includes(location)) &&
            (food === "" || item.type.includes(food))
        );
    });

    if (filtered.length === 0) {
        filtered = list;
    }

    let pick = filtered[Math.floor(Math.random() * filtered.length)];

    document.getElementById("result").innerHTML = `
        <div class="card">
            <h2>🎯 今天吃這個！</h2>
            <h3>${pick.name}</h3>
            📍 ${pick.location}<br>
            🍜 ${pick.type}
        </div>
    `;
}

</script>

</body>
</html>
