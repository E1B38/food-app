<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐廳推薦</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* 🔥 手機上方標題 */
.header {
    background: #007bff;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* 🔥 輸入區 */
.container {
    padding: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

.quick-btn {
    width: auto;
    margin: 5px 5px 5px 0;
    background: #eee;
}

.search-btn {
    background: #007bff;
    color: white;
}

/* 🔥 卡片（像App） */
.card {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card h3 {
    margin: 0 0 5px;
}

</style>
</head>

<body>

<div class="header">🍽️ 餐廳推薦</div>

<div class="container">

📍 地點
<input id="location" value="台北">

🍜 類型
<input id="food" value="日式">

<div>
<button class="quick-btn" onclick="setFood('日式')">日式</button>
<button class="quick-btn" onclick="setFood('韓式')">韓式</button>
<button class="quick-btn" onclick="setFood('台式')">台式</button>
</div>

💰 預算
<input id="budget" value="300">

<button class="search-btn" onclick="search()">查詢</button>

</div>

<div id="result"></div>

<script>

function setFood(type) {
    document.getElementById("food").value = type;
}

function search() {

    let resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "🔄 查詢中...";

    let location = document.getElementById("location").value;
    let food = document.getElementById("food").value;
    let budget = document.getElementById("budget").value;

    let url = `https://39i46pikt1.execute-api.us-east-1.amazonaws.com/recommend?location=${location}&food_type=${food}&budget=${budget}&t=${Date.now()}`;

    fetch(url)
    .then(res => res.json())
    .then(data => {

        if (!data.recommendations) {
            resultDiv.innerHTML = "❌ 沒有資料";
            return;
        }

        let html = "";

        data.recommendations.forEach(r => {
            html += `
                <div class="card">
                    <h3>${r.name}</h3>
                    ⭐ ${r.rating}　💰 ${r.price || "?"}<br>
                    💡 ${r.reason}
                </div>
            `;
        });

        resultDiv.innerHTML = html;
    })
    .catch(err => {
        console.error(err);
        resultDiv.innerHTML = "❌ 發生錯誤";
    });
}

</script>

</body>
</html>
