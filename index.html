<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>餐廳推薦</title>
<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.6/dist/amazon-cognito-identity.min.js"></script>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.header { background:#007bff; color:white; padding:15px; text-align:center; }
.container { padding:15px; }
input { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ccc; }
button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:none; }
.quick-btn { width:auto; margin:5px; background:#eee; }
.search-btn { background:#007bff; color:white; }
.card { background:white; margin:10px; padding:15px; border-radius:12px; }
</style>
</head>

<body>

<div class="header">🍽️ 餐廳推薦</div>

<!-- 🔐 登入 -->
<div id="authSection" class="container">
<h2>🔐 登入 / 註冊</h2>

<input id="username" placeholder="帳號(email)">
<input id="password" type="password" placeholder="密碼">

<button onclick="register()">註冊</button>
<button onclick="login()">登入</button>

<!-- 🔥 驗證碼 -->
<input id="code" placeholder="驗證碼">
<button onclick="confirmUser()">驗證帳號</button>

</div>

<!-- 主畫面 -->
<div id="appSection" style="display:none;">
<div style="background:#eee;padding:10px;text-align:right;">
👤 <span id="userName"></span>
<button onclick="logout()">登出</button>
</div>

<div class="container">
<input id="location" value="台北">
<input id="food" value="日式">

<button onclick="search()">推薦餐廳</button>
<button onclick="spinWheel()">🎲 隨機</button>
<button onclick="showFav()">📂 收藏</button>
</div>
</div>

<div id="result"></div>

<script>

const API_BASE = "https://39i46pikt1.execute-api.us-east-1.amazonaws.com";

const poolData = {
    UserPoolId: "us-east-1_FEseKdrJX",
    ClientId: "362d0n7u8becrcmqfn0ivvmoau"
};

const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

// UI切換
function checkUI(){
    let user = localStorage.getItem("user_id");
    let username = localStorage.getItem("username");

    if(user){
        authSection.style.display="none";
        appSection.style.display="block";
        userName.innerText=username;
    }else{
        authSection.style.display="block";
        appSection.style.display="none";
    }
}

// 註冊
function register(){

    let u = username.value;
    let p = password.value;

    let attributeList = [];

    let dataEmail = {
        Name: "email",
        Value: u
    };

    let attributeEmail = new AmazonCognitoIdentity.CognitoUserAttribute(dataEmail);
    attributeList.push(attributeEmail);

    userPool.signUp(u, p, attributeList, null, function(err){
        if(err){
            alert(err.message);
            return;
        }
        alert("✅ 註冊成功！去信箱拿驗證碼");
    });
}

// 驗證
function confirmUser(){

    let u = username.value;
    let code = document.getElementById("code").value;

    let user = new AmazonCognitoIdentity.CognitoUser({
        Username: u,
        Pool: userPool
    });

    user.confirmRegistration(code, true, function(err){
        if(err){
            alert(err.message);
            return;
        }
        alert("✅ 驗證成功！");
    });
}

// 登入
function login(){

    let u = username.value;
    let p = password.value;

    let auth = new AmazonCognitoIdentity.AuthenticationDetails({
        Username: u,
        Password: p
    });

    let user = new AmazonCognitoIdentity.CognitoUser({
        Username: u,
        Pool: userPool
    });

    user.authenticateUser(auth, {
        onSuccess: function (result) {

            let user_id = result.getIdToken().payload.sub;

            localStorage.setItem("user_id", user_id);
            localStorage.setItem("username", u);

            alert("登入成功🔥");

            checkUI();
        },
        onFailure: function(err){
            alert(err.message);
        }
    });
}

// 登出
function logout(){
    localStorage.clear();
    checkUI();
}

// 推薦
function search(){
    fetch(`${API_BASE}/recommend?location=${location.value}&food_type=${food.value}`)
    .then(res=>res.json())
    .then(data=>{
        let html="";
        data.recommendations.forEach(r=>{
            html+=`<div class="card">${r.name}</div>`;
        });
        result.innerHTML=html;
    });
}

// 收藏
function showFav(){
    let user_id = localStorage.getItem("user_id");
    fetch(`${API_BASE}/getFav?user_id=${user_id}`)
    .then(res=>res.json())
    .then(data=>{
        let html="";
        data.favorites.forEach(f=>{
            html+=`<div class="card">${f.name}</div>`;
        });
        result.innerHTML=html;
    });
}

// 轉盤
function spinWheel(){
    let user_id = localStorage.getItem("user_id");
    fetch(`${API_BASE}/getFav?user_id=${user_id}`)
    .then(res=>res.json())
    .then(data=>{
        let list=data.favorites;
        let pick=list[Math.floor(Math.random()*list.length)];
        result.innerHTML=`<div class="card">🎯 ${pick.name}</div>`;
    });
}

checkUI();

</script>
</body>
</html>
