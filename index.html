<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳推薦</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            padding: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        .quick-btn {
            width: auto;
            margin: 5px;
            background: #eee;
        }

        .search-btn {
            background: #007bff;
            color: white;
        }

        .card {
            background: white;
            margin: 10px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <div class="header">🍽️ 餐廳推薦</div>

    <div class="container">

        🔍 搜尋餐廳
        <input id="keyword" placeholder="輸入餐廳名稱">
        <button onclick="searchByName()">搜尋</button>

        <hr>

        📍 地點
        <input id="location" value="台北">

        🍜 類型
        <input id="food" value="日式">

        <div>
            <button class="quick-btn" onclick="setFood('日式')">日式</button>
            <button class="quick-btn" onclick="setFood('韓式')">韓式</button>
            <button class="quick-btn" onclick="setFood('台式')">台式</button>
        </div>

        💰 預算
        <input id="budget" value="300">

        <button class="search-btn" onclick="search()">推薦餐廳</button>

        <button onclick="randomPick()">🎲 不知道吃什麼</button>

    </div>

    <div id="result"></div>

    <script>

        const API_BASE = "https://39i46pikt1.execute-api.us-east-1.amazonaws.com";
        const USER_ID = "demo"; // 之後可以改登入

        // 類型
        function setFood(type){
        document.getElementById("food").value = type;
        }

        // 推薦（不用改）
        function search(){
        let resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "🔄 查詢中...";

        let location = document.getElementById("location").value;
        let food = document.getElementById("food").value;
        let budget = document.getElementById("budget").value;

        let url = `${API_BASE}/recommend?location=${location}&food_type=${food}&budget=${budget}`;

        fetch(url)
        .then(res=>res.json())
        .then(data=>{
        let html="";
        data.recommendations.forEach(r=>{
        html+=createCard(r.name,r.rating,r.reason,r.price,food,location);
        });
        resultDiv.innerHTML=html;
        });
        }

        // 搜尋（不用改）
        function searchByName(){
        let keyword=document.getElementById("keyword").value;
        if(!keyword){ alert("請輸入餐廳名稱"); return;}

        let url=`${API_BASE}/recommend?location=${keyword}`;

        fetch(url)
        .then(res=>res.json())
        .then(data=>{
        let html="";
        data.recommendations.forEach(r=>{
        html+=createCard(r.name,r.rating,r.reason,r.price,"搜尋",keyword);
        });
        document.getElementById("result").innerHTML=html;
        });
        }

        // 卡片
        function createCard(name,rating,reason,price,type,location){
        return `
        <div class="card">
        <h3>${name}</h3>
        ⭐ ${rating}　💰 ${price||"?"}<br>
        💡 ${reason}<br><br>

        <button onclick="toggleFav('${name}','${type}','${location}')">
        ⭐ 收藏（雲端）
        </button>
        </div>`;
        }

        // ⭐ 收藏（雲端）
        function toggleFav(name,type,location){

        fetch(`${API_BASE}/saveFav`, {
        method: "POST",
        body: JSON.stringify({
        user_id: USER_ID,
        name: name,
        type: type,
        location: location
        })
        })
        .then(()=>alert("已收藏（雲端）🔥"));
        }

        // 📂 讀收藏（雲端）
        function showFav(){

        fetch(`${API_BASE}/getFav?user_id=${USER_ID}`)
        .then(res=>res.json())
        .then(data=>{

        if(!data.favorites || data.favorites.length===0){
        document.getElementById("result").innerHTML="📭 沒有收藏";
        return;
        }

        let html="<h2>⭐ 我的收藏（雲端）</h2>";

        data.favorites.forEach(item=>{
        html+=`
        <div class="card">
        <h3>${item.name}</h3>
        📍 ${item.location}<br>
        🍜 ${item.type}<br><br>

        <button onclick="removeFav('${item.name}')">
        ❌ 取消收藏
        </button>
        </div>`;
        });

        document.getElementById("result").innerHTML=html;
        });
        }

        // ❌ 刪收藏（雲端）
        function removeFav(name){

        fetch(`${API_BASE}/deleteFav`, {
        method: "POST",
        body: JSON.stringify({
        user_id: USER_ID,
        name: name
        })
        })
        .then(()=>{
        alert("已刪除");
        showFav();
        });
        }

        // 🎡 轉盤（改成用雲端資料）
        function spinWheel(){

        fetch(`${API_BASE}/getFav?user_id=${USER_ID}`)
        .then(res=>res.json())
        .then(data=>{

        let list = data.favorites;

        if(!list || list.length===0){
        alert("還沒收藏餐廳！");
        return;
        }

        let resultDiv=document.getElementById("result");
        let i=0;
        let pick;

        let interval=setInterval(()=>{

        pick=list[Math.floor(Math.random()*list.length)];

        resultDiv.innerHTML=`
        <div class="card">
        <h2>🎡 選擇中...</h2>
        <h3>${pick.name}</h3>
        </div>`;

        i++;

        if(i>12){
        clearInterval(interval);

        resultDiv.innerHTML=`
        <div class="card">
        <h2>🎯 今天吃這個！</h2>
        <h1>${pick.name}</h1>
        📍 ${pick.location}<br>
        🍜 ${pick.type}
        </div>`;
        }

        },150);
        });
        }

    </script>

</body>
</html>
