<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>餐廳推薦系統</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 40px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 80%;
            padding: 8px;
            margin: 5px;
        }

        button {
            margin: 5px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .quick-btn {
            background: #eee;
        }

        .search-btn {
            background: #007bff;
            color: white;
        }

        .card {
            background: white;
            margin: 10px auto;
            padding: 15px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            text-align: left;
        }
    </style>

</head>

<body>

    <div class="container">
        <h2>🍽️ 餐廳推薦系統</h2>

        📍 地點<br>
        <input id="location" value="台北"><br>

        🍜 類型<br>
        <input id="food" value="日式"><br>

        🔘 快速選擇：<br>
        <button class="quick-btn" onclick="setFood('日式')">日式</button>
        <button class="quick-btn" onclick="setFood('韓式')">韓式</button>
        <button class="quick-btn" onclick="setFood('台式')">台式</button>

        <br><br>

        💰 預算<br>
        <input id="budget" value="300"><br><br>

        <button class="search-btn" onclick="search()">查詢</button>
    </div>

    <div id="result"></div>

    <script>

        function setFood(type) {
        document.getElementById("food").value = type;
        }

        function search() {

        let resultDiv = document.getElementById("result");

        // 🔥 清空 + loading
        resultDiv.innerHTML = "🔄 查詢中...";

        let location = document.getElementById("location").value;
        let food = document.getElementById("food").value;
        let budget = document.getElementById("budget").value;

        // ✅ 正確URL（這行最重要）
        let url = `https://39i46pikt1.execute-api.us-east-1.amazonaws.com/recommend?location=${location}&food_type=${food}&budget=${budget}&t=${Date.now()}`;

        fetch(url)
        .then(res => res.text())
        .then(text => {

        let data;

        try {
        data = JSON.parse(text);
        } catch (e) {
        resultDiv.innerHTML = "❌ API回傳格式錯誤";
        return;
        }

        if (!data.recommendations) {
        resultDiv.innerHTML = "❌ 沒有資料";
        return;
        }

        let html = "";

        data.recommendations.forEach(r => {
        html += `
        <div class="card">
        <h3>${r.name}</h3>
        ⭐ 評分：${r.rating}<br>
        💡 ${r.reason}
        </div>
        `;
        });

        resultDiv.innerHTML = html;
        })
        .catch(err => {
        console.error(err);
        resultDiv.innerHTML = "❌ 發生錯誤";
        });
        }

    </script>

</body>
</html>
